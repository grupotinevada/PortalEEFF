<div class="modal-header bg-light border-bottom">
    <div class="d-flex align-items-center gap-2">
        <div class="bg-warning bg-opacity-10 text-warning rounded p-2 d-flex">
            <i class="bi bi-bar-chart-fill fs-5"></i>
        </div>
        <div>
            <h4 class="fw-bold text-dark mb-0 ls-tight">Análisis del Balance</h4>
            <small class="text-muted">Balance ID: {{ id }}</small>
        </div>
    </div>
    <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>

<app-spinner [showSpinner]="loading"></app-spinner>

<div class="modal-body bg-secondary bg-opacity-10 p-4" *ngIf="!loading">
    <div class="container-fluid">
        <div class="row g-4">

            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold text-dark mb-3"><i class="bi bi-pie-chart text-primary me-2"></i>Composición
                            Financiera</h6>
                        <div class="flex-grow-1 chart-container">
                            <ngx-charts-pie-chart [results]="composicionData" [scheme]="colorScheme" [labels]="true"
                                [doughnut]="true" [arcWidth]="0.35">
                            </ngx-charts-pie-chart>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold text-dark mb-3"><i class="bi bi-bar-chart-steps text-success me-2"></i>Top 5
                            Cuentas (Saldos)</h6>
                        <div class="flex-grow-1 chart-container">
                            <ngx-charts-bar-horizontal [results]="topCuentasData" [scheme]="colorScheme" [xAxis]="true"
                                [yAxis]="true" [showXAxisLabel]="true" xAxisLabel="Saldo absoluto (CLP)">
                            </ngx-charts-bar-horizontal>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold text-dark mb-3"><i
                                class="bi bi-graph-up-arrow text-warning me-2"></i>Ingresos vs Gastos</h6>
                        <div class="flex-grow-1 chart-container">
                            <ngx-charts-bar-vertical [results]="ingresosGastosData" [scheme]="colorScheme"
                                [xAxis]="true" [yAxis]="true" [showXAxisLabel]="false" [showYAxisLabel]="true"
                                yAxisLabel="Monto (CLP)">
                            </ngx-charts-bar-vertical>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold text-dark mb-3"><i class="bi bi-diagram-3 text-danger me-2"></i>Distribución
                            de Gastos (Top 6)</h6>
                        <div class="flex-grow-1 chart-container">
                            <ngx-charts-advanced-pie-chart [results]="gastosData" [scheme]="colorScheme">
                            </ngx-charts-advanced-pie-chart>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal-footer bg-white border-top">
    <button type="button" class="btn btn-outline-secondary px-4" (click)="activeModal.close()">Cerrar</button>
</div>
