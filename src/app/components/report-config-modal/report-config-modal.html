<div class="modal-header text-white border-0 py-2" [ngClass]="'bg-' + themeClass">
  <h5 class="modal-title d-flex align-items-center fs-6">
    <i class="bi" [ngClass]="type === 'print' ? 'bi-printer-fill' : 'bi-file-earmark-spreadsheet'"></i>
    <span class="ms-2">{{ title }}</span>
  </h5>
  <button type="button" class="btn-close btn-close-white" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body p-0">
  <div class="row g-0 h-100">

    <div [class]="type === 'print' ? 'col-md-5' : 'col-12'" class="border-end bg-white"
      style="max-height: 75vh; overflow-y: auto;">

      <div class="p-3">

        <div class="row g-2 mb-3">
          <div class="col-12">
            <h6 class="fw-bold small text-muted text-uppercase mb-1">General</h6>
          </div>

          <div class="col-6">
            <label class="form-label small fw-semibold mb-1 text-truncate">Tratamiento Saldos</label>
            <select class="form-select form-select-sm" [(ngModel)]="config.alcanceNegativos"
              (ngModelChange)="emitChange()">
              <option value="auditoria">Vista Financiera</option>
              <option value="todo_negativo">Vista Cruda (+/-)</option>
            </select>
          </div>

          <div class="col-6">
            <label class="form-label small fw-semibold mb-1 text-truncate">Formato Negativos</label>
            <select class="form-select form-select-sm" [(ngModel)]="config.estiloNegativo"
              (ngModelChange)="emitChange()">
              <option value="signo">-1.500 (Signo)</option>
              <option value="parentesis">(1.500) Paréntesis</option>
            </select>
          </div>

          <div class="col-12 mt-2">
            <div class="form-check form-switch bg-light border rounded p-2 d-flex align-items-center">
              <input class="form-check-input ms-0 me-2" type="checkbox" role="switch" id="switchMilesConfig"
                [(ngModel)]="config.verEnMiles" (ngModelChange)="emitChange()">
              <label class="form-check-label small fw-semibold cursor-pointer text-primary" for="switchMilesConfig">
                Visualizar y Exportar en Miles (M$)
              </label>
            </div>
          </div>
        </div>

        <hr class="text-muted opacity-25 my-2">

        <div class="mb-3">
          <label class="form-label small fw-semibold mb-2">Tema Visual</label>
          <div class="d-flex gap-2 justify-content-between">

            <div class="rounded border p-1 text-center flex-fill cursor-pointer position-relative"
              style="transition: all 0.2s;" [class.border-primary]="config.colorTheme === 'green-black'"
              [class.bg-light]="config.colorTheme === 'green-black'"
              (click)="config.colorTheme = 'green-black'; emitChange()">
              <div class="w-100 rounded-top mb-1" style="height: 6px; background-color: #198754;"></div>
              <div class="fw-bold" style="font-size: 9px; color: #000;">(1k)</div>
            </div>

            <div class="rounded border p-1 text-center flex-fill cursor-pointer" style="transition: all 0.2s;"
              [class.border-primary]="config.colorTheme === 'green-red'"
              [class.bg-light]="config.colorTheme === 'green-red'"
              (click)="config.colorTheme = 'green-red'; emitChange()">
              <div class="w-100 rounded-top mb-1" style="height: 6px; background-color: #198754;"></div>
              <div class="fw-bold" style="font-size: 9px; color: #dc3545;">(1k)</div>
            </div>

            <div class="rounded border p-1 text-center flex-fill cursor-pointer" style="transition: all 0.2s;"
              [class.border-primary]="config.colorTheme === 'red-black'"
              [class.bg-light]="config.colorTheme === 'red-black'"
              (click)="config.colorTheme = 'red-black'; emitChange()">
              <div class="w-100 rounded-top mb-1" style="height: 6px; background-color: #dc3545;"></div>
              <div class="fw-bold" style="font-size: 9px; color: #000;">(1k)</div>
            </div>

            <div class="rounded border p-1 text-center flex-fill cursor-pointer" style="transition: all 0.2s;"
              [class.border-primary]="config.colorTheme === 'red-red'"
              [class.bg-light]="config.colorTheme === 'red-red'" (click)="config.colorTheme = 'red-red'; emitChange()">
              <div class="w-100 rounded-top mb-1" style="height: 6px; background-color: #dc3545;"></div>
              <div class="fw-bold" style="font-size: 9px; color: #dc3545;">(1k)</div>
            </div>
            <div class="rounded border p-1 text-center flex-fill cursor-pointer" style="transition: all 0.2s;"
              [class.border-primary]="config.colorTheme === 'black-black'"
              [class.bg-light]="config.colorTheme === 'black-black'"
              (click)="config.colorTheme = 'black-black'; emitChange()">
              <div class="w-100 rounded-top mb-1" style="height: 6px; background-color: #000000;"></div>
              <div class="fw-bold" style="font-size: 9px; color: #000;">(1k)</div>
            </div>

          </div>
        </div>

        <div class="bg-light rounded p-2 mb-3 border">

          <div *ngIf="mode === 'comparative'" class="row g-2 mb-2 pb-2 border-bottom">
            <div class="col-12"><span class="small fw-bold text-muted text-uppercase"
                style="font-size: 0.7rem;">Columnas</span></div>
            <div class="col-6">
              <div class="form-check form-switch form-check-sm mb-0">
                <input class="form-check-input cursor-pointer" type="checkbox" role="switch" id="switchDiff"
                  [(ngModel)]="config.mostrarDiferencia" (ngModelChange)="emitChange()">
                <label class="form-check-label small cursor-pointer" for="switchDiff">Diferencia $</label>
              </div>
            </div>
            <div class="col-6">
              <div class="form-check form-switch form-check-sm mb-0">
                <input class="form-check-input cursor-pointer" type="checkbox" role="switch" id="switchVar"
                  [(ngModel)]="config.mostrarVariacion" (ngModelChange)="emitChange()">
                <label class="form-check-label small cursor-pointer" for="switchVar">Variación %</label>
              </div>
            </div>
          </div>

          <div class="row g-2 align-items-center">
            <div class="col-12"><span class="small fw-bold text-muted text-uppercase"
                style="font-size: 0.7rem;">Detalles</span></div>

            <div class="col-6">
              <div class="form-check form-switch form-check-sm mb-0">
                <input class="form-check-input cursor-pointer" type="checkbox" role="switch"
                  [(ngModel)]="config.mostrarFsa" (ngModelChange)="emitChange()">
                <label class="form-check-label small cursor-pointer">Códigos FSA</label>
              </div>
            </div>

            <div class="col-6">
              <div class="form-check form-switch form-check-sm mb-0">
                <input class="form-check-input cursor-pointer" type="checkbox" role="switch"
                  [(ngModel)]="config.mostrarCuentas"
                  (change)="!config.mostrarCuentas && (config.incluirCuentasCero = false)"
                  (ngModelChange)="emitChange()">
                <label class="form-check-label small cursor-pointer">Ver Cuentas</label>
              </div>
            </div>

            <div class="col-12" *ngIf="config.mostrarCuentas">
              <div class="form-check form-switch form-check-sm mt-1">
                <input class="form-check-input" type="checkbox" disabled>
                <label class="form-check-label small text-muted">Incluir cuentas en cero (No disp.)</label>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div class="d-flex justify-content-between align-items-center mb-1">
            <h6 class="fw-bold small text-muted text-uppercase mb-0">Categorías</h6>

          </div>
          <div class="border rounded bg-white" style="max-height: 180px; overflow-y: auto;">
            <div class="list-group list-group-flush">
              @for (cat of config.categoriasSeleccionadas; track cat.nombre) {
              <label class="list-group-item list-group-item-action py-1 px-2 d-flex gap-2 align-items-center"
                style="cursor: pointer;">
                <input class="form-check-input mt-0 flex-shrink-0" type="checkbox" [(ngModel)]="cat.selected"
                  (ngModelChange)="emitChange()">
                <span class="small text-truncate">{{ cat.nombre }}</span>
              </label>
              }
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="col-md-7 bg-secondary-subtle d-none d-md-block" *ngIf="type === 'print'">
      <div class="h-100 d-flex flex-column p-3">
        <h6 class="fw-semibold mb-2 small text-uppercase text-muted">Vista Previa</h6>
        <div class="flex-grow-1 border rounded shadow-sm bg-white overflow-hidden">
          <iframe [srcdoc]="previewHtml" style="width: 100%; height: 100%; border: none;">
            <p>Cargando...</p>
          </iframe>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="modal-footer border-top py-2 bg-light">
  <button type="button" class="btn btn-outline-secondary btn-sm" (click)="activeModal.dismiss()">
    Cancelar
  </button>
  <button type="button" class="btn btn-sm" [ngClass]="type === 'print' ? 'btn-warning' : 'btn-teal'"
    (click)="confirm()">
    <i class="bi" [ngClass]="type === 'print' ? 'bi-printer' : 'bi-file-earmark-excel'"></i>
    <span class="ms-2 fw-semibold">{{ type === 'print' ? 'Imprimir Reporte' : 'Descargar Excel' }}</span>
  </button>
</div>
